<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eaZSt | Shopify Authorization</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-color: #1E1E1E;
            --text-main: #FFFFFF;
            --text-muted: #A0A0A0;
            --accent-color: #FFFFFF;
            --border-color: #333333;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .card {
            background-color: var(--card-color);
            padding: 40px 32px;
            border-radius: 24px;
            border: 1px solid var(--border-color);
            text-align: center;
            max-width: 420px;
            width: 100%;
            box-shadow: 0 16px 32px rgba(0, 0, 0, 0.4);
        }

        .icon-circle {
            width: 64px;
            height: 64px;
            background-color: #2A2A2A;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 20px auto;
        }

        .icon-circle svg {
            width: 32px;
            height: 32px;
            fill: var(--accent-color);
        }

        h1 {
            font-size: 24px;
            margin: 0 0 12px 0;
            font-weight: 700;
        }

        p {
            color: var(--text-muted);
            font-size: 15px;
            line-height: 1.6;
            margin: 0 0 24px 0;
        }

        .qr-placeholder {
            background-color: #FFFFFF;
            padding: 16px;
            border-radius: 12px;
            display: inline-block;
            margin-bottom: 24px;
        }

        .qr-placeholder img {
            width: 140px;
            height: 140px;
            display: block;
            /* Replace the src below with your actual QR code image once generated */
        }

        .download-btn {
            display: block;
            background-color: var(--text-main);
            color: var(--bg-color);
            padding: 14px 24px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 600;
            font-size: 15px;
            transition: opacity 0.2s ease;
            margin-bottom: 16px;
        }

        .download-btn:hover {
            opacity: 0.85;
        }

        .footer-note {
            font-size: 12px;
            color: #666666;
            margin: 0;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="icon-circle">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
        </div>

        <h1>Store Authorized</h1>
        
        <p>eaZSt is a native mobile application for Android. To view your passive income dashboard and finalize your connection, please download the app on your Android device.</p>

        <div class="qr-placeholder">
            <img src="qr-code.png" alt="Scan to download eaZSt" onerror="this.style.display='none'">
        </div>

        <a href="https://play.google.com/store/apps/details?id=com.francis.eazst" class="download-btn">Get it on Google Play</a>

        <p class="footer-note">Once installed, log in and tap the Shopify icon to sync your momentum.</p>
    </div>

</body>
</html>
