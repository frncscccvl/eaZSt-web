<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eaZSt | Unified Creator Analytics</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent: #9146FF; /* Twitch-inspired purple */
        }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 2rem;
            max-width: 400px;
            background: var(--card-bg);
            border-radius: 24px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .app-icon {
            width: 120px;
            height: 120px;
            border-radius: 28%;
            margin-bottom: 1.5rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
            /* Optional: Add a subtle glow */
            border: 2px solid var(--accent);
        }

        h1 {
            font-size: 2rem;
            margin: 0.5rem 0;
            letter-spacing: -0.025em;
        }

        p {
            color: var(--text-secondary);
            font-size: 1rem;
            line-height: 1.5;
            margin-bottom: 2rem;
        }

        .status-badge {
            display: inline-block;
            padding: 0.5rem 1rem;
            background: rgba(145, 70, 255, 0.1);
            color: var(--accent);
            border-radius: 9999px;
            font-size: 0.875rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="icon_.png" alt="eaZSt App Icon" class="app-icon">
        
        <h1>eaZSt</h1>
        <p>Your unified dashboard for viewership momentum and monetary analytics.</p>
        
        <div class="status-badge">
            Coming Soon to iOS & Android
        </div>
    </div>

</body>
</html>
