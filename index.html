<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eaZSt | Account Authorized</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-color: #1E1E1E;
            --text-main: #FFFFFF;
            --text-muted: #A0A0A0;
            --accent-color: #FFFFFF;
            --border-color: #333333;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .card {
            background-color: var(--card-color);
            padding: 40px 32px;
            border-radius: 24px;
            border: 1px solid var(--border-color);
            text-align: center;
            max-width: 420px;
            width: 100%;
            box-shadow: 0 16px 32px rgba(0, 0, 0, 0.4);
        }

        .icon-container {
            width: 80px;
            height: 80px;
            margin: 0 auto 24px auto;
        }

        .app-icon {
            width: 100%;
            height: 100%;
            border-radius: 20%; /* Matches standard app icon squircle */
            object-fit: cover;
            border: 1px solid var(--border-color);
        }

        h1 {
            font-size: 24px;
            margin: 0 0 12px 0;
            font-weight: 700;
        }

        p {
            color: var(--text-muted);
            font-size: 15px;
            line-height: 1.6;
            margin: 0 0 24px 0;
        }

        .qr-placeholder {
            background-color: #FFFFFF;
            padding: 16px;
            border-radius: 12px;
            display: inline-block;
            margin-bottom: 24px;
        }

        .qr-placeholder img {
            width: 140px;
            height: 140px;
            display: block;
        }

        .download-btn {
            display: block;
            background-color: var(--text-main);
            color: var(--bg-color);
            padding: 14px 24px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 600;
            font-size: 15px;
            transition: opacity 0.2s ease;
            margin-bottom: 16px;
        }

        .download-btn:hover {
            opacity: 0.85;
        }

        .footer-note {
            font-size: 12px;
            color: #666666;
            margin: 0;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="icon-container">
            <img src="icon_.png" alt="eaZSt Icon" class="app-icon">
        </div>

        <h1>Account Authorized</h1>
        
        <p>eaZSt is a native mobile application for creators. To view your unified viewership momentum and finalize your YouTube connection, please open the app on your mobile device.</p>

        <div class="qr-placeholder">
            <img src="qr-code.png" alt="Scan to download eaZSt" onerror="this.style.visibility='hidden'">
        </div>

        <a href="https://play.google.com/store/apps/details?id=com.francis.eazst" class="download-btn">Open eaZSt</a>

        <p class="footer-note">Your dashboard will sync automatically once you return to the app.</p>
    </div>

</body>
</html>
